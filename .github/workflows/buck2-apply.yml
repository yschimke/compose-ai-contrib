name: buck2 apply (resources)

# Installs Buck2, builds the resources-discovery target, stages the output as
# _resources.json, and publishes to compose-preview/buck2/main (baseline) or
# compose-preview/buck2/pr (PRs).

on:
  pull_request:
    paths:
      - "buck2/**"
      - ".github/workflows/buck2-apply.yml"
      - ".github/scripts/run-preview-pipeline.sh"
  push:
    branches: [main]
    paths:
      - "buck2/**"
      - ".github/workflows/buck2-apply.yml"
      - ".github/scripts/run-preview-pipeline.sh"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: buck2-apply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buck2-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Buck2
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq zstd
          curl -fsSL -o /tmp/buck2.zst \
            https://github.com/facebook/buck2/releases/download/latest/buck2-x86_64-unknown-linux-gnu.zst
          zstd -d /tmp/buck2.zst -o /tmp/buck2
          chmod +x /tmp/buck2
          sudo mv /tmp/buck2 /usr/local/bin/buck2
          buck2 --version

      - name: Build resources discovery
        working-directory: buck2
        run: buck2 build //:app_resources --show-simple-output

      - name: Stage _resources.json
        working-directory: buck2
        run: cp "$(buck2 build //:app_resources --show-simple-output)" ../_resources.json

      - name: Publish to compose-preview/buck2/{main,pr}
        env:
          PIPELINE: resources
          BASELINE_BRANCH: compose-preview/buck2/main
          PR_HEAD_BRANCH: compose-preview/buck2/pr
          COMMENT_MARKER: "<!-- preview-diff-buck2 -->"
          REPO: ${{ github.repository }}
          GITHUB_TOKEN_INLINE: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SKIP_RENDER: 'true'
          COMMENT_ON_EMPTY_DIFF: 'true'
        run: bash .github/scripts/run-preview-pipeline.sh
