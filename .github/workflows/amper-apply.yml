name: amper apply (end-to-end)

# Builds the Amper Desktop fixture, renders Greeting.png via the published
# compose-ai-tools daemon, and publishes to the per-build-system branch
# compose-preview/amper/main (baseline) or compose-preview/amper/pr (PRs).
#
# Delegates branch push + PR comment to .github/scripts/run-preview-pipeline.sh,
# which downloads the upstream pipeline scripts at the pinned SHA and runs them
# with per-system branch names. Until yschimke/compose-ai-tools gains
# `baseline-branch`/`pr-branch` inputs on the apply action, this is the
# workaround.

on:
  pull_request:
    paths:
      - "amper-cmp-desktop/**"
      - "contract-tests/amper-cmp-desktop/**"
      - ".github/workflows/amper-apply.yml"
      - ".github/scripts/run-preview-pipeline.sh"
  push:
    branches: [main]
    paths:
      - "amper-cmp-desktop/**"
      - "contract-tests/amper-cmp-desktop/**"
      - ".github/workflows/amper-apply.yml"
      - ".github/scripts/run-preview-pipeline.sh"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: amper-apply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  amper-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Amper build (produces kotlin-output/ for the producer)
        working-directory: amper-cmp-desktop
        env:
          AMPER_JAVA_OPTIONS: >-
            -ea -XX:+EnableDynamicAgentLoading
            -Djavax.net.ssl.trustStore=/etc/ssl/certs/java/cacerts
            -Djavax.net.ssl.trustStorePassword=changeit
        run: ./amper build

      - name: Produce _previews.json via the daemon
        run: ./gradlew :contract-tests:amper-cmp-desktop:run --stacktrace

      - name: Publish to compose-preview/amper/{main,pr}
        env:
          PIPELINE: compose
          BASELINE_BRANCH: compose-preview/amper/main
          PR_HEAD_BRANCH: compose-preview/amper/pr
          COMMENT_MARKER: "<!-- preview-diff-amper -->"
          REPO: ${{ github.repository }}
          GITHUB_TOKEN_INLINE: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SKIP_RENDER: 'true'
          COMMENT_ON_EMPTY_DIFF: 'true'
        run: bash .github/scripts/run-preview-pipeline.sh
