name: scripting apply (end-to-end)

# Builds the Gradle scripting binary, renders the demo's @Preview functions
# via the composeai.preview Gradle plugin, converts the plugin's discovery
# manifest + rendered PNGs into a wire-compatible _previews.json envelope,
# and publishes to compose-preview/scripting/main (baseline) or
# compose-preview/scripting/pr (PRs).

on:
  pull_request:
    paths:
      - "compose-preview-scripting/**"
      - "gradle/**"
      - "settings.gradle.kts"
      - ".github/workflows/scripting-apply.yml"
      - ".github/scripts/make-previews-envelope.py"
      - ".github/scripts/run-preview-pipeline.sh"
  push:
    branches: [main]
    paths:
      - "compose-preview-scripting/**"
      - "gradle/**"
      - "settings.gradle.kts"
      - ".github/workflows/scripting-apply.yml"
      - ".github/scripts/make-previews-envelope.py"
      - ".github/scripts/run-preview-pipeline.sh"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: scripting-apply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scripting-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build scripting binary and render demo previews
        run: |
          ./gradlew --no-daemon \
            :compose-preview-scripting:installDist \
            :compose-preview-scripting:demo:composePreviewRenderAll

      - name: Produce _previews.json
        # Converts the Gradle plugin's discovery manifest (previews.json) plus
        # the rendered PNGs into the compose-previews/v1 envelope the pipeline
        # expects — adds absolute pngPath + sha256 per capture.
        run: |
          python3 .github/scripts/make-previews-envelope.py \
            compose-preview-scripting/demo/build/compose-previews \
            ':compose-preview-scripting:demo'

      - name: Publish to compose-preview/scripting/{main,pr}
        env:
          PIPELINE: compose
          BASELINE_BRANCH: compose-preview/scripting/main
          PR_HEAD_BRANCH: compose-preview/scripting/pr
          COMMENT_MARKER: "<!-- preview-diff-scripting -->"
          REPO: ${{ github.repository }}
          GITHUB_TOKEN_INLINE: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SKIP_RENDER: 'true'
          COMMENT_ON_EMPTY_DIFF: 'true'
        run: bash .github/scripts/run-preview-pipeline.sh
